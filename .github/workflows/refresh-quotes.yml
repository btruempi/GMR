name: Refresh baked quotes

# Keeps data/quotes/*.json fresh so the site loads real prices same-origin
# (no CORS proxy needed). No secrets required -- only contents:write.

on:
  schedule:
    # Every 30 min across US market hours in BOTH DST regimes.
    # EDT (summer): 09:30-16:00 ET = 13:30-20:00 UTC. EST (winter): = 14:30-21:00 UTC.
    - cron: "*/30 13-21 * * 1-5"
    # Post-close snapshots so the final daily CLOSING bar is captured & committed:
    - cron: "45 20 * * 1-5"   # ~45m after the EDT (summer) 16:00 ET close
    - cron: "45 21 * * 1-5"   # ~45m after the EST (winter) 16:00 ET close
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-quotes
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch quotes
        run: python3 scripts/fetch_quotes.py

      - name: Commit refreshed quotes
        run: |
          if ! git diff --quiet -- data/quotes; then
            git config user.name "gmr-bot"
            git config user.email "gmr-bot@users.noreply.github.com"
            git add data/quotes
            git commit -m "Refresh baked quotes [skip ci]"
            git push
          else
            echo "No quote changes to commit."
          fi
